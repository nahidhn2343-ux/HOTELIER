<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - HOTELIER</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css"/>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <div class="logo">
            <img src="img/logo1.png" alt="Logo">
        </div>
        <ul class="nav-links">
            <li><a href="index.html" >Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html" style="color:#568c9f;;">Contact Us</a></li>
        </ul>
        <div class="nav-auth">
            <a href="login.html">
                <button class="btn-login">Login</button>
            </a>
        </div>
    </div>
</nav>

    <section class="contact-section">
        <div class="container">
            <h2 class="main-title" style="text-align: center; margin-bottom: 40px;">Contact Us</h2>
            <div class="contact-wrapper" style="display: grid; grid-template-columns: 1fr 1.8fr; gap: 40px;">
                
                <div class="contact-info-card" style="background: #003580; color: white; padding: 40px; border-radius: 20px;">
                    <h3>Hi! We are always here to help you.</h3>
                    
                    <a href="tel:+971564983456" class="info-item" style="display: flex; gap: 15px; color: white; text-decoration: none; margin: 30px 0;">
                        <i class="fas fa-headset" style="font-size: 24px;"></i>
                        <div><span>Hotline:</span><p>+971 56 498 3456</p></div>
                    </a>

                    <a href="https://wa.me/971553436433" target="_blank" class="info-item" style="display: flex; gap: 15px; color: white; text-decoration: none; margin-bottom: 30px;">
                        <i class="fab fa-whatsapp" style="font-size: 24px;"></i>
                        <div><span>SMS / Whatsapp:</span><p>+971 55 343 6433</p></div>
                    </a>

                    <a href="mailto:support@zalomi.com" class="info-item" style="display: flex; gap: 15px; color: white; text-decoration: none;">
                        <i class="fas fa-envelope" style="font-size: 24px;"></i>
                        <div><span>Email:</span><p>support@zalomi.com</p></div>
                    </a>
                </div>

                <div class="contact-form-card" style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                    <h3>Send us a message</h3>
                    <form id="contactForm">
                        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                            <input type="text" placeholder="First Name" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;" required>
                            <input type="text" placeholder="Last Name" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;" required>
                        </div>
                        <input type="email" placeholder="Email" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px;" required>
                        
                        <div style="margin-bottom: 20px;">
                            <input id="phone" type="tel" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;" required>
                        </div>

                        <textarea placeholder="Your Message" rows="4" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px;" required></textarea>
                        
                        <button type="submit" class="btn-send" style="background: #003580; color: white; padding: 12px 30px; border: none; border-radius: 25px; cursor: pointer; float: right;">Send a Message</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script>
        const phoneInputField = document.querySelector("#phone");
        const phoneInput = window.intlTelInput(phoneInputField, {
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
            initialCountry: "auto",
            geoIpLookup: callback => {
                fetch('https://ipinfo.io/json?token=YOUR_TOKEN', { headers: { 'Accept': 'application/json' }})
                    .then(resp => resp.json())
                    .then(resp => callback(resp.country))
                    .catch(() => callback('us'));
            },
            preferredCountries: ["sa", "bd", "ae"],
        });

        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // ফোন নম্বর ভ্যালিডেশন লজিক
            if (!phoneInput.isValidNumber()) {
                alert("Wrong number! Please enter your correct country code and number.");
                return;
            }
            alert("The message was sent successfully! Phone number:" + phoneInput.getNumber());
        });


        
    </script>
    <script src="script.js"></script>
</body>
</html>
