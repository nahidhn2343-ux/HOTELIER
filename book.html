<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Your Booking - HOTELIER</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
<link rel="icon" type="image/png" href="favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="shortcut icon" href="favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="manifest" href="site.webmanifest" />
</head>
<body>

<nav class="navbar">
    <div class="container">
        <div class="logo"><img src="img/logo1.png" alt="Logo"></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
    </div>
</nav>

<div class="main-booking-wrapper">
    
    <div class="booking-left-section">
        <div class="booking-card">
            <h2><i class="fa-solid fa-file-signature"></i> Guest Information</h2>
            <p style="font-weight: 300; font-size: 13px; color: #777;">Please fill in the details to complete your reservation.</p>
            <hr>

            <form id="bookingForm">
                <div class="input-grid">
                    <div class="input-group">
                        <label>Full Name</label>
                        <div class="field-with-icon">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="guestName" placeholder="Your full name" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Mobile Number</label>
                        <div class="field-with-icon tel-field">
                            <input type="tel" id="guestPhone" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>ID / Passport Number</label>
                        <div class="field-with-icon">
                            <i class="fa-solid fa-id-card"></i>
                            <input type="text" id="guestID" placeholder="ID or Passport No" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Age</label>
                        <div class="field-with-icon">
                            <i class="fa-solid fa-cake-candles"></i>
                            <input type="text" id="guestAge" placeholder="Ex: 25" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Check-in Date</label>
                        <div class="field-with-icon">
                            <i class="fa-solid fa-calendar-day"></i>
                            <input type="text" id="checkInDate" placeholder="DD/MM/YYYY" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Check-out Date</label>
                        <div class="field-with-icon">
                            <i class="fa-solid fa-calendar-check"></i>
                            <input type="text" id="checkOutDate" placeholder="DD/MM/YYYY" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Number of Guests</label>
                        <div class="field-with-icon">
                            <i class="fa-solid fa-users"></i>
                            <input type="number" id="guestCount" placeholder="Total Guests" min="1" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Number of Rooms</label>
                        <div class="field-with-icon">
                            <i class="fa-solid fa-bed"></i>
                            <input type="number" id="roomCount" placeholder="Total Rooms" min="1" required>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="booking-right-section">
        <div class="summary-card">
            <h3 style="font-weight: 600; font-size: 18px; margin-bottom: 15px;">Order Summary</h3>
            <div class="hotel-summary-content">
                <img src="img/placeholder.jpg" id="sum-hotel-img" alt="Hotel Image" style="width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-bottom: 15px;">
                <div class="sum-details">
                    <h4 id="sum-hotel-name" style="margin: 0; color: #003580; font-size: 1.2rem;">Hotel Name</h4>
                    <p id="sum-hotel-price" style="font-weight: bold; color: #333; margin: 10px 0;">Price: --</p>
                    <p id="sum-hotel-location" style="font-size: 13px; color: #777; margin-bottom: 5px;"><i class="fa-solid fa-location-dot"></i> <span>Location</span></p>
                    <p class="sum-about" style="font-size: 13px; color: #666; line-height: 1.5;">Experience luxury and comfort in the heart of the city.</p>
                </div>
            </div>
            <hr style="border: 0.5px solid #eee; margin: 20px 0;">
            <div class="total-price-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <span style="font-size: 16px; color: #333;">Total</span>
                <strong id="sum-total-display" style="font-size: 20px; color: #ff6d00;">--</strong>
            </div>
            
            <button type="button" id="submitBtn" style="width: 100%; background: #003580; color: white; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,53,128,0.2);">
                Confirm & Pay Now
            </button>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyALHhhiMDNG7CV8pTYL1x3wl47LKcCSKv4",
        authDomain: "hotelier-cdd5a.firebaseapp.com",
        projectId: "hotelier-cdd5a",
        storageBucket: "hotelier-cdd5a.firebasestorage.app",
        messagingSenderId: "716934110388",
        appId: "1:716934110388:web:7610047728b10462948be1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function loadSelectedHotel() {
        const hotelData = JSON.parse(localStorage.getItem('selectedHotel'));
        
        if (hotelData) {
            document.getElementById('sum-hotel-img').src = hotelData.image || 'img/hotel1.jpg';
            document.getElementById('sum-hotel-name').innerText = hotelData.name || 'N/A';
            document.getElementById('sum-hotel-price').innerText = "Price: " + (hotelData.price || '0') + " $";
            document.getElementById('sum-total-display').innerText = (hotelData.price || '0') + " $";
            if(hotelData.location) {
                document.querySelector('#sum-hotel-location span').innerText = hotelData.location;
            }
        }
    }
    loadSelectedHotel();

    const phoneInput = document.querySelector("#guestPhone");
    const iti = window.intlTelInput(phoneInput, {
        initialCountry: "auto",
        geoIpLookup: function(success, failure) {
            fetch("https://ipapi.co/json").then(res => res.json()).then(data => success(data.country_code)).catch(() => success("BD"));
        },
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    });

    document.getElementById('submitBtn').addEventListener('click', async () => {
        const form = document.getElementById('bookingForm');
        
        if(!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = "Processing...";

        const bookingData = {
            customerName: document.getElementById('guestName').value,
            mobile: iti.getNumber(),
            idNumber: document.getElementById('guestID').value,
            age: document.getElementById('guestAge').value,
            checkIn: document.getElementById('checkInDate').value,
            checkOut: document.getElementById('checkOutDate').value,
            // নতুন ডাটা ফায়ারবেসে পাঠানোর জন্য
            totalGuests: document.getElementById('guestCount').value,
            totalRooms: document.getElementById('roomCount').value,
            hotelName: document.getElementById('sum-hotel-name').innerText,
            totalPrice: document.getElementById('sum-total-display').innerText,
            status: "Pending",
            timestamp: new Date()
        };

        try {
            await addDoc(collection(db, "orders"), bookingData);
            alert("Success! Your booking has been confirmed.");
            localStorage.removeItem('selectedHotel');
            window.location.href = "index.html";
        } catch (error) {
            console.error(error);
            alert("Error saving data.");
            btn.disabled = false;
            btn.innerText = "Confirm & Pay Now";
        }
    });
</script>
</body>
</html>
