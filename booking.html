<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotelier - Booking Table</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin.css"> 
    <style>
        /* বাটন কালার ও ডিজাইন লজিক */
        .btn-confirm-status {
            border: none;
            padding: 6px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: 0.3s;
            min-width: 100px;
        }
        .bg-red { background-color: #ff4d4d; } /* নতুন বা পেন্ডিং অর্ডারের জন্য লাল */
        .bg-green { background-color: #2ecc71; cursor: default; } /* কনফার্ম করার পর সবুজ */
        
        .btn-confirm-status:hover {
            opacity: 0.9;
        }

        /* পপ-আপ ছোট করার জন্য অতিরিক্ত স্টাইল */
        .modal-content {
            max-width: 400px !important; /* স্ক্রিনটি আরও ছোট করা হয়েছে */
            padding: 15px !important;
            border-radius: 12px !important;
        }
        #detailsBody p {
            margin: 4px 0 !important; /* লাইনের মাঝখানের গ্যাপ কমানো হয়েছে */
            font-size: 14px; /* টেক্সট সাইজ সামান্য ছোট করা হয়েছে */
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>HOTELIER</h2>
    <ul class="sidebar-menu">
        <li class="active"><i class="fa-solid fa-calendar-check"></i> Bookings</li>
        <li><a href="admin.html" style="color:white; text-decoration:none;"><i class="fa-solid fa-hotel"></i> Management</a></li>
    </ul>
</div>

<div class="main-content">
    <div class="header">
        <h1>Recent Orders</h1>
    </div>

    <div class="table-container">
        <table class="hotel-table">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Customer Name</th>
                    <th>Hotel / Location</th>
                    <th>Booking Date</th> 
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="bookingTableBody">
                </tbody>
        </table>
    </div>
</div>

<div id="detailsModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" id="closeBtn">&times;</span>
        <h2 id="detName" style="color: #568c9f; margin-bottom: 8px; font-size: 1.2rem;">Customer Details</h2>
        <hr style="border: 0.5px solid #eee;">
        <div id="detailsBody" style="color: #333; margin-top: 10px;">
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, deleteDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyALHhhiMDNG7CV8pTYL1x3wl47LKcCSKv4",
        authDomain: "hotelier-cdd5a.firebaseapp.com",
        projectId: "hotelier-cdd5a",
        storageBucket: "hotelier-cdd5a.firebasestorage.app",
        messagingSenderId: "716934110388",
        appId: "1:716934110388:web:7610047728b10462948be1",
        measurementId: "G-BYLJ7FDQX5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const tableBody = document.getElementById('bookingTableBody');
    const modal = document.getElementById('detailsModal');
    const detailsBody = document.getElementById('detailsBody');

    function loadBookings() {
        const q = query(collection(db, "orders"), orderBy("timestamp", "desc"));

        onSnapshot(q, (querySnapshot) => {
            tableBody.innerHTML = "";

            if (querySnapshot.empty) {
                tableBody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>No bookings found.</td></tr>";
                return;
            }

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                
                let displayDate = "N/A";
                if (data.timestamp) {
                    const dateObj = data.timestamp.toDate();
                    displayDate = dateObj.toLocaleDateString();
                }
                
                const isConfirmed = data.status === "Confirmed";
                const statusText = isConfirmed ? "Confirmed" : "Pending";
                const statusClass = isConfirmed ? "bg-green" : "bg-red";
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${id.substring(0,6).toUpperCase()}</td>
                    <td><span class="customer-link" style="color: #3498db; cursor: pointer; text-decoration: underline; font-weight: 600;">${data.customerName || 'N/A'}</span></td>
                    <td>${data.hotelName || 'N/A'}</td>
                    <td>${displayDate}</td> 
                    <td>
                        <button class="btn-confirm-status ${statusClass}">
                            ${statusText}
                        </button>
                    </td>
                    <td><i class="fa-solid fa-trash btn-delete" style="color:red; cursor:pointer;"></i></td>
                `;

                tr.querySelector('.customer-link').onclick = () => showFullDetails(data, displayDate);
                
                const confirmBtn = tr.querySelector('.btn-confirm-status');
                if (!isConfirmed) {
                    confirmBtn.onclick = () => updateStatus(id);
                }

                tr.querySelector('.btn-delete').onclick = () => deleteThis(id);

                tableBody.appendChild(tr);
            });
        }, (error) => {
            console.error("Error: ", error);
        });
    }

    async function updateStatus(id) {
        if(confirm("Do you want to confirm this booking?")) {
            try {
                const orderRef = doc(db, "orders", id);
                await updateDoc(orderRef, { status: "Confirmed" });
            } catch (err) {
                alert("Error updating status: " + err.message);
            }
        }
    }

    function showFullDetails(data, displayDate) {
        detailsBody.innerHTML = `
            <div style="display: flex; flex-direction: column; gap: 4px;">
                <p><strong><i class="fa-solid fa-user"></i> Name:</strong> ${data.customerName || 'N/A'}</p>
                <p><strong><i class="fa-solid fa-phone"></i> Mobile:</strong> ${data.mobile || 'N/A'}</p>
                <p><strong><i class="fa-solid fa-id-card"></i> ID/Pass:</strong> ${data.idNumber || 'N/A'}</p>
                <p><strong><i class="fa-solid fa-cake-candles"></i> Age:</strong> ${data.age || 'N/A'}</p>
                <hr style="border: 0.5px solid #eee; margin: 4px 0;">
                <p><strong><i class="fa-solid fa-hotel"></i> Hotel:</strong> ${data.hotelName || 'N/A'}</p>
                <p><strong><i class="fa-solid fa-calendar-day"></i> Booked:</strong> ${displayDate}</p>
                <p><strong><i class="fa-solid fa-calendar-check"></i> In:</strong> ${data.checkIn || 'N/A'}</p>
                <p><strong><i class="fa-solid fa-calendar-xmark"></i> Out:</strong> ${data.checkOut || 'N/A'}</p>
                <hr style="border: 0.5px solid #eee; margin: 4px 0;">
                <p><strong><i class="fa-solid fa-bed"></i> Rooms:</strong> ${data.totalRooms || 'N/A'}</p>
                <p><strong><i class="fa-solid fa-users"></i> Guests:</strong> ${data.totalGuests || 'N/A'}</p>
                <p><strong><i class="fa-solid fa-money-bill-wave"></i> Paid:</strong> <span style="color:green; font-weight:bold;">${data.totalPrice || 'N/A'}</span></p>
            </div>
        `;
        modal.style.display = 'flex';
    }

    document.getElementById('closeBtn').onclick = () => modal.style.display = 'none';
    window.onclick = (event) => { if (event.target == modal) modal.style.display = 'none'; };

    async function deleteThis(id) {
        if(confirm("Do you want to delete this booking order?")) {
            try {
                await deleteDoc(doc(db, "orders", id));
            } catch (err) {
                alert("Delete failed: " + err.message);
            }
        }
    }

    loadBookings();
</script>

</body>
</html>
